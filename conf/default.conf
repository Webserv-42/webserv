server {
	listen 8080;
	server_name localhost;
	client_max_body_size 1048576;

	# Custom error pages
	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	# Main route — static files
	location / {
		root /var/www/html;
		index index.html;
		autoindex off;
		allowed_methods GET;
	}

	# Uploads route — accepts POST and DELETE
	location /uploads/ {
		root /var/www/uploads;
		autoindex on;
		allowed_methods GET POST DELETE;
	}

	# CGI route — Python script execution
	location /cgi-bin/ {
		root /var/www/cgi;
		allowed_methods GET POST;
		cgi_extension .py;
		cgi_path /usr/bin/python3;
	}
}
